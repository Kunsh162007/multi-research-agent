services:
  - type: web
    name: research-assistant
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm ci && npm run build
    startCommand: cd backend && uvicorn src.api:app --host 0.0.0.0 --port $PORT
    # Persistent disk — keeps SQLite databases alive across deploys/restarts.
    # Requires Render Starter plan (~$7/mo for the web service).
    disk:
      name: research-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard — free at console.groq.com
      - key: GOOGLE_CLIENT_ID
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: TAVILY_API_KEY
        sync: false          # optional — leave blank to use stub search
      - key: GEMINI_API_KEY
        sync: false          # optional — free at aistudio.google.com/apikey (vision + long-context)
      - key: SEARXNG_URL
        sync: false          # optional — PUBLIC SearXNG base URL (localhost won't work on Render)
      - key: OPENROUTER_API_KEY
        sync: false          # optional — cross-provider voice for consensus (openrouter.ai/keys)
      - key: USE_CONSENSUS
        value: "false"       # set true to draft on multiple models + judge-merge (slower, +accuracy)
      - key: USE_DEEP_CRAWL
        value: "false"       # set true to follow links from search hits (needs SEARXNG_URL)
      - key: MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: https://research-assistant-0g24.onrender.com
      - key: MONITOR_INTERVAL_HOURS
        value: "24"
      - key: MAX_ITERATIONS
        value: "8"
      - key: QUALITY_TARGET
        value: "75"
      - key: DATA_DIR
        value: /data            # point all SQLite DBs to the persistent disk
      - key: SMTP_HOST
        value: smtp.gmail.com   # Gmail SMTP — use any SMTP provider
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false             # your Gmail address (e.g. you@gmail.com)
      - key: SMTP_PASS
        sync: false             # Gmail App Password — myaccount.google.com/apppasswords
      - key: APP_URL
        value: https://research-assistant-0g24.onrender.com
